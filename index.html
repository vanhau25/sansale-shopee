<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tạo Link Shopee</title>

<style>

body{
font-family:Arial;
background:#e9b9a5;
margin:0;
padding:40px 10px;
}

.container{
max-width:720px;
margin:auto;
}

.title{
text-align:center;
font-size:30px;
color:#e64a2e;
font-weight:bold;
}

.sub{
text-align:center;
background:#f3c8b5;
display:inline-block;
padding:6px 18px;
border-radius:20px;
margin:10px auto 25px;
color:#a24e3f;
}

.center{
text-align:center;
}

.card{
background:#f4f4f4;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.label{
font-weight:bold;
margin-bottom:8px;
}

.input-box{
display:flex;
border:1px solid #ccc;
border-radius:10px;
overflow:hidden;
background:white;
}

.input-box input{
flex:1;
padding:12px;
border:none;
outline:none;
}

.paste{
background:#eee;
padding:12px 15px;
cursor:pointer;
}

button{
background:#e45c3c;
color:white;
border:none;
padding:14px;
width:100%;
margin-top:15px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.result input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
margin-top:10px;
}

.copy{
background:#00a94f;
margin-top:10px;
}

.guide{
background:#eaeaea;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.fbbtn{
display:inline-block;
margin-top:10px;
padding:8px 14px;
border:1px solid #1877f2;
border-radius:6px;
color:#1877f2;
text-decoration:none;
background:white;
}

.imagebox{
margin-top:15px;
background:#f0f0f0;
padding:10px;
border-radius:10px;
text-align:center;
}

.imagebox img{
max-width:100%;
border-radius:8px;
}

.voucher-box{
max-width:720px;
margin:30px auto;
background:white;
padding:12px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.voucher-box img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="title">🔗 Tạo Link Shopee</div>

<div class="center">
<span class="sub">vanhau.sansaleshopee</span>
</div>

<div class="card">

<div class="label">📦 Link sản phẩm Shopee</div>

<div class="input-box">
<input id="link" placeholder="Dán link Shopee vào đây...">
<input id="affiliate" value="17306040278" type="hidden">
<div class="paste" onclick="paste()">📋</div>
</div>

<button onclick="convert()">✏️ Tạo Link Ngay</button>

<div class="result">

<b>Link affiliate sẽ hiện ở đây</b>

<input id="result">

<button class="copy" onclick="copy()">Copy Link</button>

</div>

<div class="guide">

<b>ℹ️ Hướng dẫn</b>

<p>1. Sau khi tạo link, nhấn <b>Copy Link</b>.</p>
<p>2. Dán link dưới bình luận bài đăng phía dưới.</p>
<p>3. Click vào link bình luận để mở Shopee sẽ nhận được mã.</p>

<a class="fbbtn" target="_blank"
href="https://www.facebook.com/share/p/1AxEg6ocwK/">
📘 Đến bài đăng Facebook
</a>

<div class="imagebox">
<img src="voucher-facebook.png">
</div>

</div>

</div>

</div>

<script>

function paste(){
navigator.clipboard.readText().then(text=>{
document.getElementById("link").value=text;
});
}

function copy(){

let text=document.getElementById("result").value;

if(text===""){
alert("Chưa có link để copy");
return;
}

navigator.clipboard.writeText(text);
alert("Đã copy link!");
}

function convert(){

let link=document.getElementById("link").value.trim();
let affiliate="17306040278";

if(link===""){
alert("Vui lòng dán link Shopee");
return;
}

let finalLink="";

// Nếu đã là link rút gọn Shopee
if(link.includes("s.shopee.vn")){
finalLink = link;
}

// Nếu là link product
else{

let shopid="";
let itemid="";

let match1 = link.match(/product\/(\d+)\/(\d+)/);

let match2 = link.match(/-i\.(\d+)\.(\d+)/);

if(match1){
shopid = match1[1];
itemid = match1[2];
}

if(match2){
shopid = match2[1];
itemid = match2[2];
}

if(shopid==="" || itemid===""){
alert("Không nhận diện được link Shopee");
return;
}

finalLink = `https://s.shopee.vn/an_redir?origin_link=https://shopee.vn/product/${shopid}/${itemid}&affiliate_id=${affiliate}&sub_id=githubtool`;

}

document.getElementById("result").value = finalLink;

}

</script>

</body>
</html>
