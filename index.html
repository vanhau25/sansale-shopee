```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo Link Shopee Affiliate</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:40px;
text-align:center;
}

.title{
font-size:28px;
font-weight:bold;
color:#ee4d2d;
margin-bottom:20px;
}

.card{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:left;
}

.input-box{
display:flex;
border:1px solid #ddd;
border-radius:8px;
overflow:hidden;
}

.input-box input{
flex:1;
padding:12px;
border:none;
outline:none;
font-size:14px;
}

.paste{
background:#eee;
padding:12px 15px;
cursor:pointer;
}

button{
background:#ee4d2d;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
font-size:15px;
margin-top:15px;
cursor:pointer;
}

.result input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
margin-top:10px;
}

.copy{
background:#00b14f;
margin-top:10px;
}

</style>

</head>

<body>

<div class="title">🔗 Tạo Link Shopee Affiliate</div>

<div class="card">

<b>Dán link sản phẩm Shopee</b>

<div class="input-box">
<input id="link" placeholder="Ví dụ: https://shopee.vn/product/...">
<div class="paste" onclick="paste()">📋</div>
</div>

<button onclick="convert()">Tạo Link Affiliate</button>

<div class="result">

<b>Link Affiliate</b>

<input id="result">

<button class="copy" onclick="copy()">Copy Link</button>

</div>

</div>

<script>

// affiliate id của bạn
var affiliateID="17306040278";

function convert(){

var link=document.getElementById("link").value.trim();

if(link==""){
alert("Hãy dán link Shopee");
return;
}

// encode link sản phẩm
var origin=encodeURIComponent(link);

// tạo link affiliate chuẩn
var aff="https://s.shopee.vn/an_redir?origin_link="+origin+"&affiliate_id="+affiliateID+"&sub_id=toolgithub";

document.getElementById("result").value=aff;

}

function copy(){

var text=document.getElementById("result");

text.select();
document.execCommand("copy");

alert("Đã copy link!");

}

async function paste(){

try{

const text=await navigator.clipboard.readText();
document.getElementById("link").value=text;

}catch{

alert("Không thể dán tự động");

}

}

</script>

</body>

</html>
