<script>

var affiliateID="17306040278";

// lấy id sản phẩm từ mọi loại link
function extractProduct(link){

let match=link.match(/product\/(\d+)\/(\d+)/);

if(match){
return "https://shopee.vn/product/"+match[1]+"/"+match[2];
}

match=link.match(/i\.(\d+)\.(\d+)/);

if(match){
return "https://shopee.vn/product/"+match[1]+"/"+match[2];
}

return link;

}

function convert(){

let link=document.getElementById("link").value.trim();

if(!link){
alert("Hãy dán link Shopee");
return;
}

let product=extractProduct(link);

let origin=encodeURIComponent(product);

let aff="https://s.shopee.vn/an_redir?origin_link="+origin+"&affiliate_id="+affiliateID+"&sub_id=githubtool";

document.getElementById("result").value=aff;

}

function copy(){

let text=document.getElementById("result");

text.select();
document.execCommand("copy");

alert("Đã copy link!");

}

async function paste(){

try{
const text=await navigator.clipboard.readText();
document.getElementById("link").value=text;
}catch{
alert("Không thể dán tự động");
}

}

</script>
