<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Tạo Link Shopee</title>

<style>

body{
font-family: Arial;
background: linear-gradient(180deg,#f4c2a8,#f6d7c9);
margin:0;
padding:40px;
text-align:center;
}

.title{
font-size:28px;
font-weight:bold;
color:#e24d2d;
}

.domain{
background:#ffd6c7;
display:inline-block;
padding:6px 18px;
border-radius:20px;
margin-top:8px;
font-size:14px;
}

.card{
background:white;
width:600px;
max-width:95%;
margin:30px auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:left;
}

.label{
font-weight:bold;
margin-bottom:10px;
}

.input-box{
display:flex;
border:1px solid #ddd;
border-radius:12px;
overflow:hidden;
}

.input-box input{
flex:1;
padding:12px;
border:none;
outline:none;
font-size:14px;
}

.paste{
background:#eee;
padding:12px 15px;
cursor:pointer;
}

.create-btn{
background:#e75a3c;
color:white;
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

.result{
margin-top:15px;
}

.result input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.copy{
margin-top:8px;
background:#00b14f;
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
}

.guide{
background:#f7f7f7;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.fb-btn{
background:#1877f2;
color:white;
padding:10px 18px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.voucher-box{
margin-top:25px;
display:flex;
justify-content:center;
}

.voucher-box img{
width:100%;
max-width:480px;
height:auto;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

</style>

</head>

<body>

<div class="title">🔗 Tạo Link Shopee</div>
<div class="domain">vanhau25.sansaleshopee</div>
<div id="stats" style="margin-top:8px;font-size:14px;color:#444;">
👥 Người đã sử dụng: 2512
<br>
🔥 Số Link đã tạo: 9328
</div>
<div class="card">

<div class="label">📦 Link sản phẩm Shopee</div>

<div class="input-box">
<input id="link" placeholder="Dán link Shopee vào đây...">
<div class="paste" onclick="paste()">📋</div>
</div>

<button class="create-btn" onclick="convert()">✏️ Tạo Link Ngay</button>

<div class="result">
<input id="result" placeholder="Link affiliate sẽ hiện ở đây">
<button class="copy" onclick="copy()">Copy Link</button>
</div>

<div class="guide">

<b>ℹ Hướng dẫn</b>

<ol>
<li>Sau khi tạo link, nhấn <b>Copy Link</b>.</li>
<li>Dán link dưới bình luận bài đăng này.</li>
<li>Click vào link để mở Shopee sẽ nhận được mã.</li>
</ol>

<a href="https://www.facebook.com/share/p/1J1ewcFGmJ/" target="_blank">
<button class="fb-btn">Đến bài đăng Facebook</button>
</a>

</div>

<div class="voucher-box">
<img src="ma-giam-gia.png" alt="Mã giảm giá" onclick="openShopee()" style="cursor:pointer;">
</div>

</div>

<script>

let finalLink="";

async function convert(){

let link = document.getElementById("link").value.trim();

if(link==""){
alert("Hãy dán link Shopee");
return;
}

let realLink = link;

try{

// chuyển link rút gọn s.shopee.vn
if(link.includes("s.shopee.vn")){

let res = await fetch(link,{
method:"HEAD",
redirect:"follow"
});

realLink = res.url;

}

}catch(e){}

// tạo URL object
let url = new URL(realLink);

// thêm affiliate
url.searchParams.set("utm_medium","affiliates");
url.searchParams.set("utm_source","an_17306040278");
url.searchParams.set("utm_term","ek4vuwbbbk4w");

finalLink = url.toString();

document.getElementById("result").value = finalLink;

}

// copy link
function copy(){

let copyText = document.getElementById("result");

if(copyText.value==""){
alert("Chưa có link để copy");
return;
}

copyText.select();
document.execCommand("copy");

alert("Đã copy link affiliate");

}

// dán link
async function paste(){

try{
const text = await navigator.clipboard.readText();
document.getElementById("link").value = text;
}catch(e){
alert("Không thể dán tự động, hãy paste thủ công");
}

}
function openShopee(){

if(finalLink==""){
alert("Hãy tạo link trước");
return;
}

window.open(finalLink,"_blank");

}
</script>

</body>
</html>
