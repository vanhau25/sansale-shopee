```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopee Affiliate Tool</title>

<style>

body{
font-family:Arial;
background:#f6f6f6;
padding:40px;
text-align:center;
}

.title{
font-size:28px;
color:#ee4d2d;
font-weight:bold;
margin-bottom:20px;
}

.card{
background:white;
max-width:650px;
margin:auto;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:left;
}

.input-box{
display:flex;
border:1px solid #ddd;
border-radius:8px;
overflow:hidden;
}

.input-box input{
flex:1;
padding:12px;
border:none;
outline:none;
}

.paste{
background:#eee;
padding:12px 15px;
cursor:pointer;
}

button{
background:#ee4d2d;
color:white;
border:none;
padding:12px;
width:100%;
margin-top:15px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.result input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
margin-top:10px;
}

.copy{
background:#00b14f;
margin-top:10px;
}

</style>

</head>

<body>

<div class="title">Shopee Affiliate Generator</div>

<div class="card">

<b>Dán link Shopee</b>

<div class="input-box">
<input id="link" placeholder="Dán link Shopee vào đây">
<div class="paste" onclick="paste()">📋</div>
</div>

<button onclick="convert()">Tạo Link Affiliate</button>

<div class="result">

<b>Link Affiliate</b>

<input id="result">

<button class="copy" onclick="copy()">Copy Link</button>

</div>

</div>

<script>

var affiliateID="17306040278";

// lấy id sản phẩm từ mọi loại link
function extractProduct(link){

let match=link.match(/product\/(\d+)\/(\d+)/);

if(match){
return "https://shopee.vn/product/"+match[1]+"/"+match[2];
}

// link dạng i.shopid.productid
match=link.match(/i\.(\d+)\.(\d+)/);

if(match){
return "https://shopee.vn/product/"+match[1]+"/"+match[2];
}

return link;

}

function convert(){

let link=document.getElementById("link").value.trim();

if(!link){
alert("Hãy dán link Shopee");
return;
}

// lấy link product chuẩn
let product=extractProduct(link);

// encode
let origin=encodeURIComponent(product);

// tạo affiliate link
let aff="https://s.shopee.vn/an_redir?origin_link="+origin+"&affiliate_id="+affiliateID+"&sub_id=githubtool";

// hiển thị
document.getElementById("result").value=aff;

}

function copy(){

let text=document.getElementById("result");

text.select();
document.execCommand("copy");

alert("Đã copy link!");

}

async function paste(){

try{
const text=await navigator.clipboard.readText();
document.getElementById("link").value=text;
}catch{
alert("Không thể dán tự động");
}

}

</script>

</body>
</html>
```
